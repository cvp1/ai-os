# AI-OS installer build manifest (consumed by tools/build_installer.py)
version: "2026.07.01f"   # stamped into index.html + guide.html + the installer's UPGRADE-MODE header
shell: core/shell.html
prompt:
  before: core/sections/before-skills.txt
  skills_glob: core/skills/*.md   # ordered by frontmatter 'order'
  after: core/sections/after-skills.txt
  join: "\n\n"
prompt2: core/second-act/career.txt
prompt3: core/second-act/scheduler.txt
prompt4: core/second-act/projects.txt
prompt5: core/second-act/learning.txt
